# Training config for BanglaGamba

# LR schedule: warmup + cosine decay
warmup_ratio: 0.015 # 1.5% of total steps
min_lr_ratio: 0.1 # decay to 10% of peak

# Gradient
max_grad_norm: 1.0
accumulation_steps: 64 # effective batch ≈ 64 * batch_size * 2048 tokens

# Stability
z_loss_weight: 1.0e-4

# Memory optimizations
gradient_checkpointing: false # Disabled: chunked z-loss + expandable_segments keep peak at ~8.6GB
compile_model: false # Mamba-3 Triton kernels incompatible with torch.compile
compile_submodules: true # Compile FFN + GQA individually (Mamba stays uncompiled)

# Checkpointing
checkpoint_dir: saved/checkpoints
checkpoint_every: 125
keep_checkpoints: 3
model_dir: saved/model # Stripped model export (weights + config only)

# Logging
log_dir: saved/logs
run_name: default
log_every: 10
eval_every: 125
eval_batches: 50 # Max batches per eval split mid-training (0 = all)
grad_norm_monitor_steps: 300

# Pad token
pad_token_id: 0

# Total steps (0 = compute from data)
max_steps: 0
